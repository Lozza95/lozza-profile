<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lozza Profile</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Banner -->
    <div class="banner">
        <img src="banner.png" alt="Banner">
    </div>

    <!-- Profile -->
    <div class="profile-section">

        <div class="avatar">
            L
        </div>

        <h1>Lozza</h1>

        <p class="tagline">
            F1 Prediction League Competitor
        </p>

        <div class="badges">
            <span>🏆 Double 160 Club</span>
            <span>🔥 5x 100+ Scores</span>
            <span>🚀 Late Starter</span>
        </div>

    </div>

    <!-- Stats -->
    <div class="stats-container">

        <div class="stat-card">
            <h2>699</h2>
            <p>Total Points</p>
        </div>

        <div class="stat-card">
            <h2>116.5</h2>
            <p>Average Score</p>
        </div>

        <div class="stat-card">
            <h2>160</h2>
            <p>Best Race</p>
        </div>

        <div class="stat-card">
            <h2>66</h2>
            <p>Worst Race</p>
        </div>

    </div>

    <!-- Results -->
    <div class="results-section">

        <h2>2026 Results</h2>

        <table>

            <tr>
                <th>Race</th>
                <th>Score</th>
            </tr>

            <tr>
                <td>Australia</td>
                <td>DNP</td>
            </tr>

            <tr>
                <td>China</td>
                <td>101</td>
            </tr>

            <tr>
                <td>Japan</td>
                <td>160</td>
            </tr>

            <tr>
                <td>Bahrain</td>
                <td>142</td>
            </tr>

            <tr>
                <td>Saudi Arabia</td>
                <td>118</td>
            </tr>

            <tr>
                <td>Miami</td>
                <td>66</td>
            </tr>

            <tr>
                <td>Monaco</td>
                <td>112</td>
            </tr>

        </table>

    </div>

</body>

</html>
